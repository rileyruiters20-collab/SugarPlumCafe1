<!DOCTYPE html>
<html>
<head>
    <title>Contact - Suger Plum Cafe</title>
</head> 
  
<link rel="stylesheet" href="../css/style.css">

<body>
    
    <h1>Contact Us</h1>

    <p>We Would love to hear from you! Fill in the form below to send us a message.</p>

    <nav>
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>
    </nav>

    <hr>

    <p>Email: sugerplumcafe@email.com</p>
    <p>Phone: 012 345 6789</p>

    <h2>Send us a message</h2>

    <form>
        Name:<br>
        <input type="text" name="name"><br><br>

        Email:<br>
        <input type="email" name="email"><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone"><br><br>

        Message:<br>
        <textarea name="message"></textarea><br><br>

        <input type="submit" value="Send">

        <label>Subject:</label>
        <select name="Subject">
            <option>General Inquiry</option>
            <option>Order Question</option>
            <option>Feedback</option>
        </select><br><br>

        <label>Your Message:</label><br>
        <textarea name="message" rows="5" cols="40" required></textarea><br><br>

        <label>
            <input type="checkbox" required> I agree to be contacted
        </label><br><br>

        <input type="submit" value="Send message">
        <input type="reset" value="Clear Form">
</form>

<p>Visit us at our cafe in Cape Town</p>

</body>
</html>
